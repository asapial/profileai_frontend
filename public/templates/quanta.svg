<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="800" fill="#f8fafc"/>
  <!-- Header band -->
  <rect x="0" y="0" width="600" height="140" fill="#1e293b"/>
