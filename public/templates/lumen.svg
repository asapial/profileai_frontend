<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="800" fill="#fffdf7"/>
  <text x="300" y="100" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="40" font-weight="700" fill="#1f1b2e">Lumen Park</text>
  <text x="300" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#a8a29e">Product Designer · lumen@example.com</text>
  <!-- Section card 1 -->
  <rect x="60" y="160" width="480" height="120" rx="14" fill="#fef3c7" opacity="0.5"/>
  <text x="80" y="190" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#92400e" letter-spacing="2">EXPERIENCE</text>
  <rect x="80" y="210" width="280" height="8" rx="2" fill="#1f1b2e"/>
  <rect x="80" y="226" width="180" height="6" rx="2" fill="#a8a29e"/>
  <rect x="80" y="246" width="440" height="5" rx="2" fill="#d6d3d1"/>
  <rect x="80" y="256" width="420" height="5" rx="2" fill="#d6d3d1"/>
  <!-- Section card 2 -->
  <rect x="60" y="300" width="480" height="120" rx="14" fill="#ddd6fe" opacity="0.5"/>
  <text x="80" y="330" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#5b21b6" letter-spacing="2">EDUCATION</text>
  <rect x="80" y="350" width="280" height="8" rx="2" fill="#1f1b2e"/>
  <rect x="80" y="366" width="180" height="6" rx="2" fill="#a8a29e"/>
  <rect x="80" y="386" width="440" height="5" rx="2" fill="#d6d3d1"/>
  <!-- Section card 3 -->
  <rect x="60" y="440" width="480" height="120" rx="14" fill="#cffafe" opacity="0.5"/>
  <text x="80" y="470" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#155e75" letter-spacing="2">SKILLS</text>
  <g font-family="Inter, system-ui, sans-serif" font-size="10" fill="#1f1b2e">
    <rect x="80"  y="490" width="80"  height="22" rx="11" fill="#ffffff" stroke="#a8a29e"/>
    <text x="120" y="505" text-anchor="middle">Figma</text>
    <rect x="170" y="490" width="80"  height="22" rx="11" fill="#ffffff" stroke="#a8a29e"/>
    <text x="210" y="505" text-anchor="middle">UX</text>
    <rect x="260" y="490" width="100" height="22" rx="11" fill="#ffffff" stroke="#a8a29e"/>
    <text x="310" y="505" text-anchor="middle">Prototyping</text>
    <rect x="370" y="490" width="100" height="22" rx="11" fill="#ffffff" stroke="#a8a29e"/>
    <text x="420" y="505" text-anchor="middle">Research</text>
  </g>
