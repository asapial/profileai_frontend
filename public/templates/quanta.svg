  <rect x="40" y="400" width="240" height="9" rx="2" fill="#0f172a"/>
  <rect x="40" y="416" width="160" height="7" rx="2" fill="#0ea5e9"/>
  <rect x="40" y="434" width="320" height="5" rx="2" fill="#cbd5e1"/>
  <rect x="40" y="444" width="280" height="5" rx="2" fill="#cbd5e1"/>
  <!-- Right column -->
  <text x="400" y="210" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#1e293b" letter-spacing="3">SKILLS</text>
  <rect x="400" y="230" width="140" height="6" rx="2" fill="#94a3b8"/>
  <rect x="400" y="246" width="120" height="6" rx="2" fill="#94a3b8"/>
