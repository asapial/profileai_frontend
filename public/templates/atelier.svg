<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" preserveAspectRatio="xMidYMid slice">
  <rect width="600" height="800" fill="#fdf4ff"/>
  <!-- Magazine-style top -->
  <text x="40" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#a21caf" letter-spacing="6" font-weight="700">ATELIER · ISSUE 01</text>
  <line x1="40" y1="74" x2="560" y2="74" stroke="#a21caf" stroke-width="1"/>
  <text x="40" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#1c1917">Camille</text>
  <text x="40" y="170" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#1c1917" font-style="italic">Rosemont</text>
  <text x="40" y="198" font-family="Georgia, 'Times New Roman', serif" font-size="11" fill="#a21caf" letter-spacing="2">EDITORIAL DESIGNER · PARIS</text>
  <!-- Two column text -->
  <line x1="40" y1="240" x2="290" y2="240" stroke="#a21caf" stroke-width="1"/>
  <rect x="40" y="260" width="250" height="6" rx="2" fill="#a8a29e"/>
  <rect x="40" y="272" width="240" height="6" rx="2" fill="#a8a29e"/>
  <rect x="40" y="284" width="220" height="6" rx="2" fill="#a8a29e"/>
  <rect x="40" y="296" width="240" height="6" rx="2" fill="#a8a29e"/>
  <rect x="40" y="308" width="200" height="6" rx="2" fill="#a8a29e"/>
  <line x1="310" y1="240" x2="560" y2="240" stroke="#a21caf" stroke-width="1"/>
  <rect x="310" y="260" width="250" height="6" rx="2" fill="#a8a29e"/>
  <rect x="310" y="272" width="240" height="6" rx="2" fill="#a8a29e"/>
  <rect x="310" y="284" width="220" height="6" rx="2" fill="#a8a29e"/>
  <rect x="310" y="296" width="240" height="6" rx="2" fill="#a8a29e"/>
  <!-- Pull quote -->
  <rect x="40" y="370" width="520" height="100" fill="#f5d0fe"/>
  <text x="60" y="410" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#1c1917" font-style="italic">"Design is the silent</text>
  <text x="60" y="438" font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#1c1917" font-style="italic">ambassador of your brand."</text>
  <!-- Clients grid -->
  <text x="40" y="520" font-family="Georgia, 'Times New Roman', serif" font-size="11" font-weight="700" fill="#a21caf" letter-spacing="3">CLIENTS</text>
  <g font-family="Georgia, 'Times New Roman', serif" font-size="12" fill="#1c1917">
    <text x="40"  y="550">Hermès</text>
    <text x="160" y="550">Vogue</text>
    <text x="270" y="550">Aesop</text>
    <text x="380" y="550">Tiffany</text>
    <text x="490" y="550">Sotheby's</text>
  </g>
</svg>