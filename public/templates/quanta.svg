  <rect x="400" y="360" width="140" height="9" rx="2" fill="#0f172a"/>
  <rect x="400" y="376" width="120" height="7" rx="2" fill="#475569"/>
  <rect x="400" y="394" width="140" height="5" rx="2" fill="#cbd5e1"/>
